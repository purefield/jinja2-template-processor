# claude-debug-rbac.yaml
# Minimal read + pod-level debug access for KubeVirt/OVN network troubleshooting.
# No access to Secrets. No long-lived token Secret. No node-root access.
#
# Apply:  oc apply -f claude-debug-rbac.yaml
# Token:  oc create token claude-debug -n ocp-acm-cluster
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-debug
  namespace: ocp-acm-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-debug-viewer
rules:
  # Core cluster/network visibility needed for VM path tracing.
  - apiGroups: [""]
    resources: [nodes, namespaces, events]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines, virtualmachineinstances]
    verbs: [get, list, watch]
  - apiGroups: [subresources.kubevirt.io]
    resources:
      - virtualmachineinstances/console
      - virtualmachineinstances/vnc
    verbs: [get]
  - apiGroups: [k8s.cni.cncf.io]
    resources: [network-attachment-definitions]
    verbs: [get, list, watch]
  - apiGroups: [k8s.ovn.org]
    resources: [userdefinednetworks, clusteruserdefinednetworks]
    verbs: [get, list, watch]
  - apiGroups: [nmstate.io]
    resources:
      - nodenetworkconfigurationpolicies
      - nodenetworkstates
      - nodenetworkconfigurationenactments
    verbs: [get, list, watch]
  # Permit SCC use needed for exec against existing KubeVirt pods.
  - apiGroups: [security.openshift.io]
    resources: [securitycontextconstraints]
    resourceNames: [kubevirt-controller]
    verbs: [use]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-debug-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-debug-viewer
subjects:
  - kind: ServiceAccount
    name: claude-debug
    namespace: ocp-acm-cluster
---
# Pod exec scoped to ocp-acm-cluster only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-debug-exec
  namespace: ocp-acm-cluster
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, pods/exec]
    verbs: [create, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-debug-exec
  namespace: ocp-acm-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-debug-exec
subjects:
  - kind: ServiceAccount
    name: claude-debug
    namespace: ocp-acm-cluster
---
# Exec into OVN pods for network diagnostics.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-debug-exec
  namespace: openshift-ovn-kubernetes
rules:
  - apiGroups: [""]
    resources: [pods/exec, pods, pods/log]
    verbs: [create, get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-debug-exec
  namespace: openshift-ovn-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-debug-exec
subjects:
  - kind: ServiceAccount
    name: claude-debug
    namespace: ocp-acm-cluster
