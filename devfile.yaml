schemaVersion: 2.2.0
metadata:
  name: clusterfile
  displayName: Clusterfile Editor
  description: Jinja2 template processor and schema-driven editor for OpenShift cluster configuration
  language: Python
  projectType: other
  version: 1.0.0

parent:
  id: python
  registryUrl: https://registry.devfile.io
  version: 3.1.0

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 4Gi
      memoryRequest: 512Mi
      cpuLimit: "2"
      cpuRequest: 250m
      mountSources: true
      env:
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: npm_config_cache
          value: /tmp/.npm
      endpoints:
        - name: editor-app
          targetPort: 8000
          protocol: https
          exposure: public
          secure: true
        - name: editor-dev
          targetPort: 5000
          protocol: https
          exposure: public
          secure: true

commands:
  - id: install-python-deps
    exec:
      label: "Install Python dependencies"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: pip install -r requirements.txt
      group:
        kind: build
        isDefault: false

  - id: install-node-deps
    exec:
      label: "Install Node dependencies"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm install
      group:
        kind: build
        isDefault: false

  - id: install-deps
    exec:
      label: "Install all dependencies"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: pip install -r requirements.txt && npm install
      group:
        kind: build
        isDefault: true

  - id: install-claude-code
    exec:
      label: "Install Claude Code CLI"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: npm install -g @anthropic-ai/claude-code
      group:
        kind: build
        isDefault: false

  - id: run-tests
    exec:
      label: "Run test suite"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: python -m pytest tests/ -v
      group:
        kind: test
        isDefault: true

  - id: run-editor
    exec:
      label: "Run editor app (dev mode)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: bash apps/editor/run-dev.sh
      group:
        kind: run
        isDefault: true

  - id: process-template
    exec:
      label: "Process a template (usage: set CLUSTERFILE and TEMPLATE env vars)"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: python process.py ${TEMPLATE:-templates/kubevirt-cluster.yaml.tpl} ${CLUSTERFILE:-data/kubevirt.clusterfile}
      group:
        kind: run
        isDefault: false

  - id: lint-yaml
    exec:
      label: "Lint YAML templates"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: yamllint templates/ plugins/
      group:
        kind: test
        isDefault: false

  - id: claude-code
    exec:
      label: "Start Claude Code"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: claude
      group:
        kind: run
        isDefault: false
